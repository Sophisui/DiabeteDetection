version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Passw0rd123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  authservice:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
    depends_on:
        - sqlserver
    environment:
        - Jwt__Key=SuperSecretKey123!SuperSecretKey123!
        - Jwt__Issuer=AuthService
        - Jwt__Audience=DiabeteDetection
        - ConnectionStrings__AuthDb=Server=sqlserver,1433;Database=AuthDb;User Id=sa;Password=Passw0rd123!;TrustServerCertificate=True;

  patientservice:
    build:
      context: ./PatientService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - sqlserver
      - authservice
    environment:
      - ConnectionStrings__PatientDb=Server=sqlserver,1433;Database=PatientDb;User Id=sa;Password=Passw0rd123!;TrustServerCertificate=True;

  noteservice:
    build:
      context: ./NoteService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    depends_on:
      - mongodb
      - authservice
    environment:
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=NoteDb

  riskservice:
      build:
        context: ./RiskService
        dockerfile: Dockerfile
      ports:
        - "5005:8080"
      depends_on:
        - authservice
      environment:
        - GatewayUrl=http://gateway:8080/
        - Jwt__Key=SuperSecretKey123!SuperSecretKey123!
        - Jwt__Issuer=AuthService
        - Jwt__Audience=DiabeteDetection

  gateway:
    build:
      context: ./GatewayService
      dockerfile: DockerFile.yml
    ports:
      - "5000:8080"
    depends_on:
        - authservice
        - patientservice
        - noteservice
    environment:
        - Jwt__Key=SuperSecretKey123!SuperSecretKey123!
        - Jwt__Issuer=AuthService
        - Jwt__Audience=DiabeteDetection

  frontend:
    build:
      context: ./FrontendService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      - gateway
    environment:
      - GatewayUrl=http://gateway:8080

volumes:
  sqldata:
  mongodata: